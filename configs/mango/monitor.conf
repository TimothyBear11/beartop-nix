# Monitor rules
# DP-2 - Left monitor
monitorrule=name:^DP-2$,width:1920,height:1080,refresh:60,x:0,y:252,scale:1,rr:0

# DP-1 - Middle monitor
monitorrule=name:^DP-1$,width:2560,height:1440,refresh:165,x:1920,y:0,scale:1,rr:0

# HDMI-A-1 - Right monitor
monitorrule=name:^HDMI-A-1$,width:1920,height:1080,refresh:60,x:4480,y:252,scale:1,rr:0
