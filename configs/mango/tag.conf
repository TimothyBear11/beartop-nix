# Tag configuration
# Every tag (1-9) exists on every monitor
# Customize layout per tag per monitor by editing below
#
# Available layouts: tile, scroller, grid, deck, monocle, center_tile,
#                    vertical_tile, right_tile, vertical_scroller,
#                    vertical_grid, vertical_deck, tgmix
#
# Format: tagrule=id:<tag_id>,monitor_name:<monitor>,layout_name:<layout>

# ============================================
# DP-2 - Left Monitor (Spectre)
# ============================================
tagrule=id:1,monitor_name:^DP-2$,layout_name:scroller
tagrule=id:2,monitor_name:^DP-2$,layout_name:scroller
tagrule=id:3,monitor_name:^DP-2$,layout_name:scroller
tagrule=id:4,monitor_name:^DP-2$,layout_name:scroller
tagrule=id:5,monitor_name:^DP-2$,layout_name:scroller
tagrule=id:6,monitor_name:^DP-2$,layout_name:scroller
tagrule=id:7,monitor_name:^DP-2$,layout_name:scroller


# ============================================
# DP-1 - Middle Monitor (Omen)
# ============================================
tagrule=id:1,monitor_name:^DP-1$,layout_name:center_tile
tagrule=id:2,monitor_name:^DP-1$,layout_name:center_tile
tagrule=id:3,monitor_name:^DP-1$,layout_name:center_tile
tagrule=id:4,monitor_name:^DP-1$,layout_name:center_tile
tagrule=id:5,monitor_name:^DP-1$,layout_name:center_tile
tagrule=id:6,monitor_name:^DP-1$,layout_name:center_tile
tagrule=id:7,monitor_name:^DP-1$,layout_name:center_tile


# ============================================
# HDMI-A-1 - Right Monitor (LG)
# ============================================
tagrule=id:1,monitor_name:^HDMI-A-1$,layout_name:tile
tagrule=id:2,monitor_name:^HDMI-A-1$,layout_name:tile
tagrule=id:3,monitor_name:^HDMI-A-1$,layout_name:tile
tagrule=id:4,monitor_name:^HDMI-A-1$,layout_name:tile
tagrule=id:5,monitor_name:^HDMI-A-1$,layout_name:tile
tagrule=id:6,monitor_name:^HDMI-A-1$,layout_name:tile
tagrule=id:7,monitor_name:^HDMI-A-1$,layout_name:tile
