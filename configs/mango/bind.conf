###################
### KEYBINDINGS ###
###################

bind=SUPER,Q,killclient,
bind=SUPER,Return,spawn,kitty
bind=SUPER,T,spawn,konsole
bind=SUPER,E,spawn,dolphin
bind=SUPER,K,spawn,kate
bind=SUPER,P,spawn,positron
bind=SUPER,J,spawn,joplinp
bind=SUPER,B,spawn,floorp
bind=SUPER,Z,spawn,zeditor
bind=SUPER,N,spawn,kitty -e nvim


bind=SUPER,D,spawn,noctalia-shell ipc call launcher toggle
bind=SUPER,F1,spawn,noctalia-shell ipc call controlCenter toggle
bind=SUPER,F2,spawn,noctalia-shell ipc call settings toggle
bind=SUPER,F3,spawn,noctalia-shell ipc call launcher clipboard
bind=SUPER,F4,spawn,noctalia-shell ipc call sessionMenu toggle


# ============================================
# Window Focus (SUPER + Arrows - like niri)
# ============================================
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down


# ============================================
# Workspaces (1-9) - Numbered tags
# SUPER+1-9 to view workspace 1-9, SUPER+SHIFT+1-9 to move window
# ============================================
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9


# ============================================
# Monitor Navigation
# ============================================
bind=SUPER+CTRL,Left,focusmon,left
bind=SUPER+CTRL,Right,focusmon,right

bind=SUPER+SHIFT+CTRL,Left,tagmon,left
bind=SUPER+SHIFT+CTRL,Right,tagmon,right

# ============================================
# Window States & Actions
# ============================================

# Window Resizing
bind=SUPER,equal,resizewin,5,0
bind=SUPER,minus,resizewin,-5,0
bind=SUPER+CTRL,equal,resizewin,0,5
bind=SUPER+CTRL,minus,resizewin,0,-5

bind=SUPER,V,togglefloating

# Toggle overview
bind=SUPER,X,toggleoverview,
bind=ALT,Tab,toggleoverview,
bind=SUPER,Tab,focusstack,next

# Fullscreen and maximize
bind=SUPER,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=ALT,a,togglemaximizescreen,

# Minimize/restore
bind=SUPER,I,minimized,
bind=SUPER+SHIFT,I,restore_minimized
bind=SUPER+SHIFT,o,toggleoverlay,
bind=SUPER+SHIFT,g,toggleglobal,

# Scratchpad
bind=ALT,z,toggle_scratchpad

# ============================================
# Screenshot
# ============================================
bind=SUPER+SHIFT,S,spawn,/home/don/.config/mango/bin/screenshot.sh

# ============================================
# Gaps & Layout
# ============================================
bind=CTRL,space,switch_layout
# bind=CTRL,s,setlayout,scroller
# bind=CTRL,d,setlayout,center_tile
# bind=CTRL,a,setlayout,tile

# Scroller layout
bind=SUPER+ALT,f,set_proportion,1.0
bind=ALT,space,switch_proportion_preset,

# Gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps
bind=SUPER+SHIFT,A,spawn,/home/don/.config/mango/bin/toggle-outer-gaps.sh
