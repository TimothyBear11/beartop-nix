# Window Rules for Mango

# Floating konsole window - smaller size (800x600)
windowrule=isfloating:1,width:900,height:600,title:floating-konsole

# Steam - idle inhibit when focused (prevents screen lock during gameplay)
windowrule=indleinhibit_when_focus:1,appid:steam
windowrule=scroller_proportion:1.0,appid:steam


# Discord - always floating on HDMI-A-1 (top-left area)
windowrule=monitor:HDMI-A-1,appid:discord

# Telegram - always floating on HDMI-A-1 (bottom-left area)
windowrule=monitor:HDMI-A-1,appid:org.telegram.desktop
