# Environment variables for non-mango items (waybar, noctalia, etc.)
# Note: Icon theme is handled by GTK settings files (~/.config/gtk-3.0/settings.ini)

# GTK/QT theming - force dark mode
#env=GTK_THEME,Adwaita-dark
env=QT_QPA_PLATFORMTHEME,qt6ct

# Force dark mode for libadwaita/GTK4 apps
#env=GTK_THEME_VARIANT,dark

# Cursor and icon themes
env=XCURSOR_THEME,Bibata-Modern-Ice
env=XCURSOR_SIZE,24

# Include flatpak exports for icons and desktop files
# Full XDG_DATA_DIRS with flatpak paths prepended
env=XDG_DATA_DIRS,/home/don/.local/share/flatpak/exports/share:/var/lib/flatpak/exports/share:/home/don/.local/share:/usr/local/share:/usr/share

# Session type
env=XDG_CURRENT_DESKTOP,mango
env=XDG_SESSION_TYPE,wayland
